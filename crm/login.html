<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM — Alice Prata</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/crm.css"/>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <img src="../alice-prata-logo.png" alt="Alice Prata" class="login-logo"/>
    <h1 class="login-title">CRM</h1>
    <p class="login-sub">Área restrita — agente autorizada</p>

    <div class="login-error" id="loginError"></div>

    <form id="emailForm" onsubmit="signInEmail(event)">
      <label class="fi-label" for="emailInput">Email</label>
      <input class="fi" type="email" id="emailInput" required autocomplete="email" placeholder="seu@email.com"/>

      <label class="fi-label" for="pwInput">Senha</label>
      <input class="fi" type="password" id="pwInput" required autocomplete="current-password" placeholder="••••••••"/>

      <button type="submit" class="submit-btn mt-14" id="emailBtn">Entrar</button>
    </form>

    <div class="login-divider">ou</div>

    <button class="google-btn" id="googleBtn" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>
  </div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
firebase.initializeApp(window.firebaseConfig);
const auth = firebase.auth();

// If already signed in, go directly to board
auth.onAuthStateChanged(user => {
  if (user) window.location.href = 'index.html';
});

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearError() {
  const el = document.getElementById('loginError');
  el.style.display = 'none';
  el.textContent = '';
}

async function signInEmail(e) {
  e.preventDefault();
  clearError();
  const btn = document.getElementById('emailBtn');
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  try {
    await auth.signInWithEmailAndPassword(
      document.getElementById('emailInput').value.trim(),
      document.getElementById('pwInput').value
    );
    // onAuthStateChanged will redirect
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    const msgs = {
      'auth/user-not-found':  'Email não encontrado.',
      'auth/wrong-password':  'Senha incorreta.',
      'auth/invalid-email':   'Email inválido.',
      'auth/too-many-requests': 'Muitas tentativas. Aguarde e tente novamente.',
    };
    showError(msgs[err.code] || 'Erro ao entrar. Tente novamente.');
  }
}

async function signInGoogle() {
  clearError();
  const btn = document.getElementById('googleBtn');
  btn.disabled = true;
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
    // onAuthStateChanged will redirect
  } catch (err) {
    btn.disabled = false;
    if (err.code !== 'auth/popup-closed-by-user') {
      showError('Erro ao entrar com Google. Tente novamente.');
    }
  }
}
</script>
</body>
</html>
