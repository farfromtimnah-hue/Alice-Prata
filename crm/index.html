<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Board — Alice Prata CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/crm.css"/>
</head>
<body>

<nav class="crm-nav">
  <img src="../alice-prata-logo.png" alt="Alice Prata" class="nav-logo"/>
  <span class="nav-title">CRM</span>
  <div class="nav-links">
    <a href="index.html" class="nav-link active" data-i18n="ui.active">Ativos</a>
    <a href="profile.html" class="nav-link" data-i18n="ui.profile_title">Perfil</a>
  </div>
  <div class="nav-lang">
    <button class="nav-lang-btn active" data-lang-btn="pt" onclick="crm.setLang('pt')">PT</button>
    <button class="nav-lang-btn" data-lang-btn="en" onclick="crm.setLang('en')">EN</button>
  </div>
  <div class="nav-user">
    <span id="navUserEmail"></span>
    <button class="nav-signout" onclick="crm.signOut()" data-i18n="ui.sign_out">Sair</button>
  </div>
</nav>

<div class="page">
  <div class="board-toolbar">
    <input type="search" class="board-search" id="searchInput" placeholder="Buscar leads..." oninput="onSearch(this.value)"/>
    <div class="board-filter-wrap">
      <select class="board-filter" id="sortSelect" onchange="onSort(this.value)">
        <option value="newest">Mais recentes</option>
        <option value="oldest">Mais antigos</option>
        <option value="last_contact">Sem contato (primeiro)</option>
      </select>
    </div>
    <div class="board-filter-wrap">
      <select class="board-filter" id="sourceFilter" onchange="onSourceFilter(this.value)">
        <option value="">Todas as fontes</option>
        <option value="landing-insurance">Seguro</option>
        <option value="landing-resources">Recursos</option>
        <option value="emergency-guide">Guia Emergência</option>
        <option value="referral">Indicação</option>
      </select>
    </div>
  </div>

  <div id="boardRoot" class="board-scroll">
    <div class="loading-state">
      <span class="spinner"></span>
      <span>Carregando...</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/board.js"></script>
</body>
</html>
